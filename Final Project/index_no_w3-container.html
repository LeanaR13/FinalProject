            <section class="w3-row row-color-1"> <!-- In this row, we  have the w3-row class only, which defines

                <article class="w3-col s12 m4 l4">
                    <h4>Boat Statement Poster</h4>

                    

                    
                    <p><!-- Trigger the Modal -->
    <img id="myImg" src="assets /BoatStatement-72dpi.jpg" alt="Mention the boat thumbnail" style="width:100%;max-width:300px">

<!-- The Modal -->
<div id="myModal" class="modal">

  <!-- The Close Button -->
  <span class="close">&times;</span>

  <!-- Modal Content (The Image) -->
  <img class="modal-content" id="img01">

  <!-- Modal Caption (Image Text) -->
  <div id="caption"></div>
</div></p>
                </article>
                <article class="w3-col s12 m4 l4">
                    <h4><a title="High Poster">High Statement Poster</a></h4>

                    <script>// Get the modal
var modal = document.getElementById("myModal");

// Get the image and insert it inside the modal - use its "alt" text as a caption
var img = document.getElementById("myImg");
var modalImg = document.getElementById("img01");
var captionText = document.getElementById("caption");
img.onclick = function(){
  modal.style.display = "block";
  modalImg.src = this.src;
  captionText.innerHTML = this.alt;
}

// Get the <span> element that closes the modal
var span = document.getElementsByClassName("close")[0];

// When the user clicks on <span> (x), close the modal
span.onclick = function() {
  modal.style.display = "none";
}</script>
